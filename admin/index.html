<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serene Greece — Content Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f3ef; color: #1a1612; }
  .login { max-width: 400px; margin: 120px auto; text-align: center; }
  .login h1 { font-size: 1.4rem; margin-bottom: 8px; }
  .login p { color: #888; font-size: .85rem; margin-bottom: 20px; }
  .login input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; margin-bottom: 12px; }
  .login button { width: 100%; padding: 12px; background: #B8955A; color: #fff; border: none; border-radius: 6px; font-size: .9rem; cursor: pointer; }
  .login button:hover { background: #9a7a48; }

  .app { display: none; }
  .topbar { background: #1a1612; color: #B8955A; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }
  .topbar button { background: #B8955A; color: #fff; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: .8rem; }
  .topbar .logout { background: transparent; color: #B8955A; border: 1px solid #B8955A; margin-left: 10px; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  .section { background: #fff; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e8e4dd; }
  .section-header { padding: 16px 20px; border-bottom: 1px solid #e8e4dd; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .section-header h2 { font-size: .95rem; font-weight: 600; }
  .section-header span { color: #B8955A; font-size: 1.2rem; transition: transform .2s; }
  .section-header.open span { transform: rotate(180deg); }
  .section-body { padding: 20px; display: none; }
  .section-body.open { display: block; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; font-family: inherit; }
  .field textarea { min-height: 80px; resize: vertical; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #B8955A; box-shadow: 0 0 0 2px rgba(184,149,90,.15); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

  .field select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; font-family: inherit; background: #fff; }
  .field select:focus { outline: none; border-color: #B8955A; box-shadow: 0 0 0 2px rgba(184,149,90,.15); }

  .list-card { margin-bottom: 16px; padding: 12px; background: #faf9f7; border-radius: 6px; }
  .list-card-title { font-weight: 600; margin-bottom: 8px; font-size: .8rem; }
  .list-section-title { font-weight: 700; font-size: .85rem; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #e8e4dd; color: #B8955A; text-transform: uppercase; letter-spacing: 1px; }
  .list-section-title:first-child { margin-top: 0; }

  .add-btn { display: inline-block; padding: 8px 16px; background: #B8955A; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .8rem; margin-top: 8px; }
  .add-btn:hover { background: #9a7a48; }
  .remove-btn { display: inline-block; padding: 4px 10px; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .75rem; margin-top: 6px; }
  .remove-btn:hover { background: #c0392b; }

  .unit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .unit-grid { grid-template-columns: 1fr; } }
  .unit-card { padding: 10px; background: #faf9f7; border-radius: 6px; border-left: 3px solid #B8955A; }
  .unit-card.status-sold { border-left-color: #e74c3c; }
  .unit-card.status-reserved { border-left-color: #f39c12; }
  .unit-card .unit-id { font-weight: 700; font-size: .8rem; margin-bottom: 6px; }

  .tabs { display: flex; background: #2a2520; border-bottom: 2px solid #B8955A; position: sticky; top: 52px; z-index: 9; }
  .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border: none; background: transparent; }
  .tab.active { color: #B8955A; background: rgba(184,149,90,.1); }
  .tab:hover { color: #B8955A; }

  .status { padding: 10px 20px; background: #e8f5e9; color: #2e7d32; border-radius: 6px; margin-bottom: 16px; display: none; }
  .status.error { background: #ffebee; color: #c62828; }
  .loading { opacity: .5; pointer-events: none; }
</style>
</head>
<body>

<div class="login" id="loginPanel">
  <h1>Serene Greece CMS</h1>
  <p>Enter your GitHub Personal Access Token to manage content</p>
  <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
  <button onclick="doLogin()">Sign In</button>
  <p style="margin-top:12px;font-size:.75rem;color:#aaa;">Token is stored in your browser only</p>
</div>

<div class="app" id="appPanel">
  <div class="topbar">
    <h1>Serene Greece CMS</h1>
    <div>
      <button onclick="saveContent()">💾 Save & Publish</button>
      <button class="logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('sitewide')">Sitewide</button>
    <button class="tab" onclick="switchTab('dunes')">Serene Dunes</button>
    <button class="tab" onclick="switchTab('olea')">Serene Olea</button>
  </div>
  <div class="container">
    <div class="status" id="status"></div>
    <div id="editor"></div>
  </div>
</div>

<script>
const REPO = 'serenegreeceike-blip/SERENEGREECEMARKETING-WEBSITE';
const FILE = 'content.json';
const BRANCH = 'main';
let content = {};
let fileSha = '';

function doLogin() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  localStorage.setItem('sg_token', token);
  init();
}
function doLogout() {
  localStorage.removeItem('sg_token');
  location.reload();
}

async function ghFetch(path, opts = {}) {
  const token = localStorage.getItem('sg_token');
  const res = await fetch('https://api.github.com' + path, {
    ...opts,
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json', ...(opts.headers||{}) }
  });
  return res;
}

async function init() {
  const token = localStorage.getItem('sg_token');
  if (!token) { document.getElementById('loginPanel').style.display='block'; document.getElementById('appPanel').style.display='none'; return; }

  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('appPanel').style.display = 'block';

  try {
    const res = await ghFetch('/repos/' + REPO + '/contents/' + FILE + '?ref=' + BRANCH);
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    fileSha = data.sha;
    content = JSON.parse(atob(data.content.replace(/\n/g, '')));
    renderEditor();
    showStatus('Content loaded successfully', false);
  } catch (e) {
    showStatus('Error loading content: ' + e.message, true);
  }
}

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  el.style.display = 'block';
  if (!isError) setTimeout(() => el.style.display = 'none', 3000);
}

async function saveContent() {
  try {
    document.getElementById('appPanel').classList.add('loading');
    const body = JSON.stringify({
      message: 'Update content via CMS',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      sha: fileSha,
      branch: BRANCH
    });
    const res = await ghFetch('/repos/' + REPO + '/contents/' + FILE, { method: 'PUT', body });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    fileSha = data.content.sha;
    showStatus('Published successfully! Site will update in ~1 minute.', false);
  } catch (e) {
    showStatus('Error saving: ' + e.message, true);
  } finally {
    document.getElementById('appPanel').classList.remove('loading');
  }
}

var currentTab = 'sitewide';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  event.target.classList.add('active');
  renderEditor();
}

function renderEditor() {
  var ed = document.getElementById('editor');
  ed.innerHTML = '';
  var sections = [];

  if (currentTab === 'sitewide') {
    sections = [
      { key: 'sitewide.hero', title: 'Hero Section', fields: [
        { k: 'eyebrow', l: 'Eyebrow Text', t: 'input' },
        { k: 'heading', l: 'Heading', t: 'input' },
        { k: 'headingItalic', l: 'Heading (italic)', t: 'input' },
        { k: 'description', l: 'Description', t: 'textarea' },
        { k: 'cta1', l: 'CTA Button 1', t: 'input' },
        { k: 'cta2', l: 'CTA Button 2', t: 'input' },
      ]},
      { key: 'sitewide.urgencyBar', title: 'Urgency Bar', fields: [
        { k: 'message', l: 'Message', t: 'input' },
        { k: 'availability', l: 'Availability Text', t: 'input' },
        { k: 'available', l: 'Units Available', t: 'input' },
        { k: 'total', l: 'Total Units', t: 'input' },
        { k: 'cta', l: 'CTA Button Text', t: 'input' },
      ]},
      { key: 'sitewide.contact', title: 'Contact Info', fields: [
        { k: 'heading', l: 'Heading', t: 'input' },
        { k: 'headingItalic', l: 'Heading (italic)', t: 'input' },
        { k: 'description', l: 'Description', t: 'textarea' },
        { k: 'phone', l: 'Phone', t: 'input' },
        { k: 'phoneHours', l: 'Hours', t: 'input' },
        { k: 'office1', l: 'Office 1', t: 'input' },
        { k: 'office2', l: 'Office 2', t: 'input' },
        { k: 'whatsapp', l: 'WhatsApp Number', t: 'input' },
      ]},
      { key: 'sitewide.images', title: 'Site Images', fields: [
        { k: 'heroBg', l: 'Hero Background', t: 'input' },
        { k: 'contactBg', l: 'Contact Background', t: 'input' },
      ]},
    ];
  } else {
    var p = 'projects.' + currentTab;
    sections = [
      { key: p, title: 'Project Info', fields: [
        { k: 'name', l: 'Name', t: 'input' }, { k: 'location', l: 'Location', t: 'input' },
        { k: 'status', l: 'Status', t: 'input' }, { k: 'tagline', l: 'Tagline', t: 'input' },
        { k: 'heroImage', l: 'Hero Image URL', t: 'input' }, { k: 'thumbImage', l: 'Thumbnail URL', t: 'input' },
      ]},
      { key: p+'.unitTypes.A', title: 'Unit Type A', fields: [
        { k: 'label', l: 'Label', t: 'input' }, { k: 'name', l: 'Name', t: 'input' },
        { k: 'specs', l: 'Specs', t: 'input' }, { k: 'price', l: 'Price', t: 'input' },
        { k: 'image', l: 'Image URL', t: 'input' },
      ]},
      { key: p+'.unitTypes.B', title: 'Unit Type B', fields: [
        { k: 'label', l: 'Label', t: 'input' }, { k: 'name', l: 'Name', t: 'input' },
        { k: 'specs', l: 'Specs', t: 'input' }, { k: 'price', l: 'Price', t: 'input' },
        { k: 'image', l: 'Image URL', t: 'input' },
      ]},
      { key: p+'.unitTypes.C', title: 'Unit Type C', fields: [
        { k: 'label', l: 'Label', t: 'input' }, { k: 'name', l: 'Name', t: 'input' },
        { k: 'specs', l: 'Specs', t: 'input' }, { k: 'price', l: 'Price', t: 'input' },
        { k: 'image', l: 'Image URL', t: 'input' },
      ]},
      { key: p+'.locationSection', title: 'Location Section', fields: [
        { k: 'tag', l: 'Tag', t: 'input' }, { k: 'title', l: 'Title', t: 'input' },
        { k: 'description', l: 'Description', t: 'textarea' },
      ]},
      { key: p+'.investmentSection', title: 'Investment Section', fields: [
        { k: 'tag', l: 'Tag', t: 'input' }, { k: 'title', l: 'Title', t: 'input' },
        { k: 'description', l: 'Description', t: 'textarea' },
      ]},
      { key: p+'.images', title: 'Project Images', fields: [
        { k: 'galleryMain', l: 'Gallery — Main', t: 'input' },
        { k: 'galleryTopRight', l: 'Gallery — Top Right', t: 'input' },
        { k: 'galleryMidRight', l: 'Gallery — Mid Right', t: 'input' },
        { k: 'galleryBotRight', l: 'Gallery — Bottom Right', t: 'input' },
        { k: 'floorPlanGround', l: 'Floor Plan — Ground', t: 'input' },
        { k: 'floorPlan1st', l: 'Floor Plan — 1st Floor', t: 'input' },
        { k: 'locationHalkidiki', l: 'Location — Halkidiki', t: 'input' },
      ]},
    ];
  };

  sections.forEach((sec, si) => {
    const obj = getNestedObj(content, sec.key);
    if (!obj) return;

    const div = document.createElement('div');
    div.className = 'section';
    const header = document.createElement('div');
    header.className = 'section-header' + (si === 0 ? ' open' : '');
    header.innerHTML = '<h2>' + sec.title + '</h2><span>▼</span>';
    header.onclick = function() {
      this.classList.toggle('open');
      this.nextElementSibling.classList.toggle('open');
    };
    div.appendChild(header);

    const body = document.createElement('div');
    body.className = 'section-body' + (si === 0 ? ' open' : '');

    sec.fields.forEach(f => {
      const fd = document.createElement('div');
      fd.className = 'field';
      const lbl = document.createElement('label');
      lbl.textContent = f.l;
      fd.appendChild(lbl);

      const el = document.createElement(f.t === 'textarea' ? 'textarea' : 'input');
      el.value = obj[f.k] !== undefined ? obj[f.k] : '';
      el.oninput = function() { setNestedVal(content, sec.key + '.' + f.k, this.value); };
      fd.appendChild(el);
      body.appendChild(fd);
    });

    div.appendChild(body);
    ed.appendChild(div);
  });

  if (currentTab === 'sitewide') {
    renderMethod(ed);
    renderBooking(ed);
  } else {
    var pKey = 'projects.' + currentTab;
    renderListSection(ed, pKey+'.advantages', 'Advantages', ['emoji','title','description']);
    renderUnits(ed, pKey);
    renderListSection(ed, pKey+'.paymentPlan.milestones', 'Payment Milestones', ['phase','percentage']);
    renderListSection(ed, pKey+'.timeline.milestones', 'Timeline Milestones', ['date','label','status']);
    renderListSection(ed, pKey+'.specifications.specs', 'Specifications', ['label','value']);
    renderListSection(ed, pKey+'.specifications.inclusions', 'Inclusions', ['text','included']);
    renderListSection(ed, pKey+'.locationDetail.distances', 'Location Distances', ['value','label','desc']);
  }
}

function renderAdvantages(ed) {
  if (!content.advantages) return;
  const div = document.createElement('div');
  div.className = 'section';
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = '<h2>Advantages (4 items)</h2><span>▼</span>';
  header.onclick = function() { this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); };
  div.appendChild(header);

  const body = document.createElement('div');
  body.className = 'section-body';

  content.advantages.forEach((adv, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'margin-bottom:16px;padding:12px;background:#faf9f7;border-radius:6px;';
    wrap.innerHTML = '<div style="font-weight:600;margin-bottom:8px;font-size:.8rem;">Advantage ' + (i+1) + '</div>';

    ['emoji', 'title', 'description'].forEach(k => {
      const fd = document.createElement('div');
      fd.className = 'field';
      const lbl = document.createElement('label');
      lbl.textContent = k.charAt(0).toUpperCase() + k.slice(1);
      fd.appendChild(lbl);
      const inp = document.createElement('input');
      inp.value = adv[k] || '';
      inp.oninput = function() { content.advantages[i][k] = this.value; };
      fd.appendChild(inp);
      wrap.appendChild(fd);
    });
    body.appendChild(wrap);
  });
  div.appendChild(body);
  ed.appendChild(div);
}

/* ── Helper: create a collapsible section shell ── */
function createSection(ed, title) {
  const div = document.createElement('div');
  div.className = 'section';
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = '<h2>' + title + '</h2><span>▼</span>';
  header.onclick = function() { this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); };
  div.appendChild(header);
  const body = document.createElement('div');
  body.className = 'section-body';
  div.appendChild(body);
  ed.appendChild(div);
  return body;
}

/* ── Helper: create a labelled input/textarea/select inside a container ── */
function addField(container, label, value, onChange, type) {
  type = type || 'input';
  const fd = document.createElement('div');
  fd.className = 'field';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  fd.appendChild(lbl);
  const el = document.createElement(type === 'textarea' ? 'textarea' : 'input');
  el.value = value || '';
  el.oninput = function() { onChange(this.value); };
  fd.appendChild(el);
  container.appendChild(fd);
  return fd;
}

function addSelect(container, label, value, options, onChange) {
  const fd = document.createElement('div');
  fd.className = 'field';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  fd.appendChild(lbl);
  const sel = document.createElement('select');
  options.forEach(function(opt) {
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
    if (opt === value) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = function() { onChange(this.value); };
  fd.appendChild(sel);
  container.appendChild(fd);
  return fd;
}

/* ── 1. Units ── */
function renderListSection(ed, path, title, fieldKeys) {
  var arr = getNestedObj(content, path);
  if (!arr || !Array.isArray(arr)) return;
  var div = document.createElement('div'); div.className = 'section';
  var header = document.createElement('div'); header.className = 'section-header';
  header.innerHTML = '<h2>'+title+' ('+arr.length+')</h2><span>▼</span>';
  header.onclick = function(){ this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open'); };
  div.appendChild(header);
  var body = document.createElement('div'); body.className = 'section-body';
  function rebuildList() {
    body.innerHTML = '';
    var arr2 = getNestedObj(content, path);
    arr2.forEach(function(item, i){
      var card = document.createElement('div'); card.className = 'list-card';
      card.innerHTML = '<div class="list-card-title">'+title+' #'+(i+1)+'</div>';
      fieldKeys.forEach(function(k){
        var fd = document.createElement('div'); fd.className = 'field';
        var lbl = document.createElement('label'); lbl.textContent = k;
        fd.appendChild(lbl);
        if (k === 'included') {
          var sel = document.createElement('select');
          sel.innerHTML = '<option value="true"'+(item[k]===true?' selected':'')+'>Yes</option><option value="false"'+(item[k]===false?' selected':'')+'>No</option>';
          sel.onchange = function(){ item[k] = this.value === 'true'; };
          fd.appendChild(sel);
        } else {
          var inp = document.createElement('input'); inp.value = item[k]||'';
          inp.oninput = function(){ item[k] = this.value; };
          fd.appendChild(inp);
        }
        card.appendChild(fd);
      });
      var rm = document.createElement('button'); rm.className = 'remove-btn'; rm.textContent = 'Remove';
      rm.onclick = function(){ arr2.splice(i, 1); header.querySelector('h2').textContent = title+' ('+arr2.length+')'; rebuildList(); };
      card.appendChild(rm);
      body.appendChild(card);
    });
    var addBtn = document.createElement('button'); addBtn.className = 'add-btn'; addBtn.textContent = '+ Add';
    addBtn.onclick = function(){
      var newItem = {}; fieldKeys.forEach(function(k){ newItem[k] = k==='included'?true:''; });
      arr2.push(newItem); header.querySelector('h2').textContent = title+' ('+arr2.length+')'; rebuildList();
    };
    body.appendChild(addBtn);
  }
  rebuildList();
  div.appendChild(body);
  ed.appendChild(div);
}

function renderUnits(ed, pKey) {
  var units = getNestedObj(content, pKey+'.units');
  if (!units) return;
  var body = createSection(ed, 'Units (' + units.length + ' units)');

  function rebuild() {
    body.innerHTML = '';
    var grid = document.createElement('div');
    grid.className = 'unit-grid';
    var units2 = getNestedObj(content, pKey+'.units');

    units2.forEach(function(unit, i) {
      var card = document.createElement('div');
      card.className = 'unit-card status-' + (unit.status || 'available');
      card.innerHTML = '<div class="unit-id">#' + (i + 1) + ' — ' + (unit.name || 'Unit') + '</div>';

      addField(card, 'Zone', unit.zone, function(v) { units2[i].zone = v; });
      addField(card, 'Name', unit.name, function(v) { units2[i].name = v; card.querySelector('.unit-id').textContent = '#' + (i+1) + ' — ' + v; });
      addSelect(card, 'Type', unit.type, ['A', 'B', 'C'], function(v) { units2[i].type = v; });
      addSelect(card, 'Status', unit.status, ['available', 'sold', 'reserved'], function(v) {
        units2[i].status = v;
        card.className = 'unit-card status-' + v;
      });
      grid.appendChild(card);
    });

    body.appendChild(grid);

    var addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Add Unit';
    addBtn.onclick = function() {
      units2.push({ zone: '', name: '', type: 'A', status: 'available' });
      rebuild();
    };
    body.appendChild(addBtn);
  }
  rebuild();
}

/* ── 2. Payment Plan ── */
function renderPaymentPlan(ed) {
  if (!content.paymentPlan) return;
  var body = createSection(ed, 'Payment Plan');

  function rebuild() {
    body.innerHTML = '';
    addField(body, 'Description', content.paymentPlan.description, function(v) { content.paymentPlan.description = v; }, 'textarea');
    addField(body, 'Note', content.paymentPlan.note, function(v) { content.paymentPlan.note = v; }, 'textarea');

    var title = document.createElement('div');
    title.className = 'list-section-title';
    title.textContent = 'Milestones';
    body.appendChild(title);

    var milestones = content.paymentPlan.milestones || [];
    milestones.forEach(function(m, i) {
      var card = document.createElement('div');
      card.className = 'list-card';
      card.innerHTML = '<div class="list-card-title">Milestone ' + (i + 1) + '</div>';
      addField(card, 'Phase', m.phase, function(v) { content.paymentPlan.milestones[i].phase = v; });

function getNestedObj(obj, path) {
  return path.split('.').reduce((o, k) => o && o[k], obj);
}
function setNestedVal(obj, path, val) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => o[k] = o[k] || {}, obj);
  target[last] = val;
}
